name: Build and deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  repository_dispatch:
    types:
      - blog-updated

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        run: |
          git clone https://github.com/ynhugo/ynhugo.github.io.git .
          git checkout master

      # 直接下载官方最新Extended版Hugo，彻底解决版本兼容问题
      - name: Install Latest Hugo Extended
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.157.0/hugo_extended_0.157.0_linux-amd64.tar.gz
          tar -zxvf hugo_extended_0.157.0_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: 拉取私有博客内容 + LFS
        run: |
          git clone --depth 1 https://${{ secrets.PRIVATE_BLOG_REPO_TOKEN }}@github.com/ynhugo/blogs.git content/post
          cd content/post
          git lfs pull

      - name: 合并评论配置
        run: |
          sed -i '/^\[comments\]/,/^$/d' config/_default/params.toml
          if [ -f "content/post/giscus.toml" ]; then
            cat content/post/giscus.toml >> config/_default/params.toml
          fi

      - name: 运行短代码脚本
        run: |
          chmod +x shortcode.sh
          ./shortcode.sh

      - name: 更新主题依赖
        run: |
          hugo mod get -u github.com/CaiJimmy/hugo-theme-stack/v4
          hugo mod tidy

      - name: 构建网站
        run: |
          hugo --minify --gc

      - name: 发布到 gh-pages
        run: |
          cd public
          git init
          git config user.name "Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy"
          git push -f https://${{ github.token }}@github.com/ynhugo/ynhugo.github.io.git master:gh-pages
