name: Build and deploy (Official Pages + Private Repo + LFS + Giscus)

run-name: "Build and deploy (triggered by ${{ github.event_name }})"

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  repository_dispatch:
    types: [blog-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Delete default content/post
        run: rm -rf content/post

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Git LFS
        run: git lfs install

      - name: Clone private blog posts
        uses: actions/checkout@v6
        with:
          repository: ynhugo/blogs
          token: ${{ secrets.PRIVATE_BLOG_REPO_TOKEN }}
          path: content/post
          lfs: true

      - name: Show content
        run: ls -la content/post

      - name: Run shortcode.sh
        run: |
          chmod +x shortcode.sh
          ./shortcode.sh

      - name: Inject giscus config
        run: |
          sed -i '/^\[comments\]/,/^$/d' config/_default/params.toml
          if [ -f "content/post/giscus.toml" ]; then
            cat content/post/giscus.toml >> config/_default/params.toml
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
