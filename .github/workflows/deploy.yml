name: Build and deploy (No LFS Version)

run-name: "No LFS Build Deploy - ${{ github.event_name }}"

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  repository_dispatch:
    types: [blog-updated]

# 官方Pages部署最小权限配置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制，避免重复构建冲突
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      # 拉取公开仓库完整代码
      - name: Checkout public repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      # 清空默认博文目录，准备拉取私有仓库博文
      - name: Delete default content
        run: rm -rf content

      # 安装环境依赖，适配Hugo编译
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 初始化Pages部署配置
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      # 核心适配：关闭LFS拉取，纯Git模式拉取私有博文
      - name: Clone private blog posts (No LFS)
        uses: actions/checkout@v6
        with:
          repository: ynhugo/blogs
          token: ${{ secrets.PRIVATE_BLOG_REPO_TOKEN }}
          path: content
          lfs: false # 关键配置：禁用LFS下载，彻底规避LFS额度限制

      # 校验博文文件拉取结果
      - name: Show content
        run: ls -la content

      # 执行自定义短代码脚本，适配主题样式
      - name: Run content/autoconfig.sh
        run: |
          chmod +x content/autoconfig.sh
          bash content/autoconfig.sh

      # 动态注入私有仓库Giscus评论配置，覆盖原有配置
      - name: Inject giscus config
        run: |
          sed -i '/^\[comments\]/,/^$/d' config/_default/params.toml
          if [ -f "content/giscus.toml" ]; then
            cat content/giscus.toml >> config/_default/params.toml
          fi

      # 加载最新Hugo扩展版本
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      # 优化编译：清理缓存、压缩静态资源、适配官方域名
      - name: Build
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      # 上传编译产物，用于Pages部署
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  # 官方标准部署流程
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
