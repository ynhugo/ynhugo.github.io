name: Build and deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [blog-updated]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        run: |
          git clone https://github.com/ynhugo/ynhugo.github.io.git .
          git checkout main

      - name: Install Hugo
        run: |
          sudo apt-get update
          sudo apt-get install -y hugo

      - name: Clone private posts
        run: |
          git clone --depth 1 https://${{ secrets.PRIVATE_BLOG_REPO_TOKEN }}@github.com/ynhugo/blogs.git content/post
          cd content/post
          git lfs pull

      - name: Apply giscus config
        run: |
          sed -i '/^\[comments\]/,/^$/d' config/_default/params.toml
          if [ -f "content/post/giscus.toml" ]; then
            cat content/post/giscus.toml >> config/_default/params.toml
          fi

      - name: Run shortcode script
        run: |
          chmod +x shortcode.sh
          ./shortcode.sh

      - name: Build site
        run: |
          hugo --minify --gc

      - name: Deploy to gh-pages
        run: |
          cd public
          git init
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Deploy"
          git push -f https://${{ secrets.GITHUB_TOKEN }}@github.com/ynhugo/ynhugo.github.io.git main:gh-pages
