name: Build and deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  repository_dispatch:
    types: [blog-updated]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ==============================================
      # 🔥 缓存 Git LFS 和 Hugo 构建文件（核心加速）
      # ==============================================
      - name: Cache LFS & Hugo assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.git/lfs
            .git/lfs
            content/post/.git/lfs
            ./resources/_gen
            .hugo_cache
          key: ${{ runner.os }}-blog-lfs-hugo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-blog-lfs-hugo-

      # 浅克隆私有仓库（你原来的配置，不动）
      - name: Clone private posts (shallow)
        run: |
          git clone --depth 1 --branch main \
          https://${{ secrets.PRIVATE_BLOG_REPO_TOKEN }}@github.com/ynhugo/blogs.git content/post

      - name: List posts
        run: ls -la content/post

      - name: Clean old public
        run: rm -rf public

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Apply giscus config
        run: |
          sed -i '/^\[comments\]/,/^$/d' config/_default/params.toml
          if [ -f "content/post/giscus.toml" ]; then
            cat content/post/giscus.toml >> config/_default/params.toml
          fi

      # 构建命令：开启缓存，加速编译
      - name: Build site
        run: |
          ./shortcode.sh
          hugo --minify --gc --logLevel error --cache .hugo_cache

      # 增量部署（你原来的配置，不动）
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
